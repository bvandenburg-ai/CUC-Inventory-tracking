<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Inventory Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Event Inventory Tracker</h1>
    <p class="sub">Assign inventory to events and prevent overbooking</p>
  </header>

  <main class="container">
    <section class="card compact-card">
      <div class="header-row">
        <div>
          <h2>Dashboard</h2>
          <p class="muted">Load events, inventory, and assignments from Google Calendar and Sheets.</p>
        </div>
        <button id="loadBtn">Load / Refresh Data</button>
      </div>
      <p id="loadStatus" class="status"></p>
    </section>

    <section class="card assign-card">
      <h2>Assign Items</h2>
      <form id="assignmentForm" class="form-grid">
        <label>Event
          <select id="eventSelect" required></select>
        </label>
        <label>Inventory Item
          <select id="itemSelect" required></select>
        </label>
        <label>Quantity
          <input type="number" id="qtyInput" min="1" required />
        </label>
        <label>Notes
          <input type="text" id="notesInput" placeholder="Optional notes" />
        </label>
        <div>
          <p id="availableText" class="badge">Available: -</p>
        </div>
        <button type="submit">Save Assignment</button>
      </form>
      <p id="formMessage" class="status"></p>
    </section>

    <section class="grid-2">
      <section class="card">
        <h2>Inventory Warnings</h2>
        <div id="inventoryWarnings" class="list"></div>
      </section>
      <section class="card">
        <h2>Overbooking Issues</h2>
        <div id="overbookings" class="list"></div>
      </section>
    </section>

    <section class="card">
      <h2>Upcoming Events Calendar</h2>
      <div id="calendarView" class="calendar-grid"></div>
    </section>

    <section class="card">
      <h2>Setup List</h2>
      <div class="tabs">
        <button class="tab-btn active" data-tab="byEvent">By Event</button>
        <button class="tab-btn" data-tab="byItem">By Item</button>
      </div>
      <div id="setupByEvent"></div>
      <div id="setupByItem" class="hidden"></div>
      <button onclick="window.print()">Print Setup List</button>
    </section>

    <section class="card">
      <h2>Inventory</h2>
      <div id="inventoryList" class="list"></div>
    </section>

    <section class="hidden">
      <div id="todayEvents"></div>
      <div id="upcomingEvents"></div>
      <div id="eventsList"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
