<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CUC Event Inventory Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <h1>CUC Event Inventory Tracker</h1>
        <p>Assign inventory to events and<br />prevent overbooking</p>
      </div>
      <button id="refreshBtn" class="refresh-btn">Click Here First</button>
    </header>

    <section class="card assign-card">
      <h2>Assign Items</h2>

      <form id="assignmentForm" class="assignment-grid">
        <label>
          Event
          <select id="eventSelect" required></select>
        </label>

        <label>
          Inventory Item
          <select id="itemSelect" required></select>
        </label>

        <label>
          Quantity
          <input id="quantityInput" type="number" min="1" required />
        </label>

        <label>
          Notes
          <input id="notesInput" type="text" placeholder="Optional notes" />
        </label>

        <div class="available-pill" id="availableText">Available: -</div>
        <button class="save-btn" type="submit">Save Assignment</button>
      </form>
    </section>

    <section class="calendar-section">
      <h2 class="section-title">Upcoming Events</h2>

      <div class="calendar-shell">
        <div class="calendar-controls">
          <button id="prevBtn">Previous 30 Days</button>
          <h3 id="calendarTitle"></h3>
          <button id="nextBtn">Next 30 Days</button>
        </div>

        <div class="weekday-row">
          <div>Sunday</div>
          <div>Monday</div>
          <div>Tuesday</div>
          <div>Wednesday</div>
          <div>Thursday</div>
          <div>Friday</div>
          <div>Saturday</div>
        </div>

        <div id="calendarGrid" class="calendar-grid"></div>
      </div>
    </section>

    <section class="card setup-card">
      <h2>Setup List</h2>
      <div class="setup-tabs">
        <button class="active">By Event</button>
        <button>By Item</button>
      </div>
      <button class="print-btn">Print Setup List</button>
    </section>

    <section class="inventory-section">
      <h2 class="section-title">CUC Master Inventory List</h2>
      <table>
        <thead>
          <tr>
            <th>Item Name</th>
            <th>Category</th>
            <th>Qty In Stock</th>
          </tr>
        </thead>
        <tbody id="inventoryBody"></tbody>
      </table>
    </section>
  </main>

  <dialog id="calendarDialog">
    <form id="calendarAssignForm" method="dialog">
      <h2 id="dialogEventTitle"></h2>

      <label>
        Inventory Item
        <select id="calendarItemSelect"></select>
      </label>

      <label>
        Quantity
        <input id="calendarQtyInput" type="number" min="1" value="1" />
      </label>

      <menu>
        <button type="button" id="closeDialogBtn">Cancel</button>
        <button type="submit" class="save-btn">Assign Item</button>
      </menu>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
